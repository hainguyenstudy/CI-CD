name: Node.js CI & Deploy

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22.x]

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - run: npm ci
    - run: npm run build --if-present
    - run: npm test

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-test          # Chỉ chạy nếu build-and-test thành công (trên tất cả matrix)
    if: github.ref == 'refs/heads/main'   # Chỉ deploy khi push vào main (không deploy trên PR)

    steps:
    - name: Deploy to Server via SSH
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USERNAME }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: ${{ secrets.SSH_PORT || '22' }}
        script: |
          # Load nvm (thay ~/.nvm nếu path khác, nhưng thường là ~/.nvm)
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"  # Load nvm
          [ -s "$NVM_DIR/bash_completion" ] && \. "$NVM_DIR/bash_completion"  # Optional completion
        
          nvm use 24.14.0   # Hoặc nvm use 24 nếu alias default
        
          cd /home/hai/source/next.js/examples/with-jest
          
          git fetch origin
          git reset --hard origin/main
          
          bun install --production   # Nếu dùng bun, hoặc npm ci --production
          bun run build              # Hoặc npm run build
          
          # Restart pm2 (giờ pm2 sẽ tìm thấy vì nvm loaded)
          pm2 restart ci-cd      # Hoặc tên app của bạn
          # Nếu vẫn fail, dùng full path:
          # /home/hai/.nvm/versions/node/v24.14.0/bin/pm2 restart next-jest
          
          echo "Deployment completed successfully!"
