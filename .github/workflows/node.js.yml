name: Node.js CI & Deploy

on:
  push:
    branches: [ "docker" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22.x]

    steps:
    - uses: actions/checkout@v4
    - name: Create .env file
      run: |
        echo "${{ secrets.ENV_DOCKER }}" > .env
    - name: Build Docker Image
      run: |
        docker build --platform linux/amd64 -t hainguyenstudy/nextjs:latest .
    - name: Push Docker Image to Docker Hub
      run: |
        echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
        docker push hainguyenstudy/nextjs:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build          # Chỉ chạy nếu build thành công (trên tất cả matrix)
    if: github.ref == 'refs/heads/docker'   # Chỉ deploy khi push vào docker (không deploy trên PR)

    steps:
    - name: Deploy to Server via SSH
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USERNAME }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: ${{ secrets.SSH_PORT || '22' }}
        script: |
          docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}
          docker pull hainguyenstudy/nextjs:latest
          docker stop prod-nextjs
          docker rm prod-nextjs
          docker run -d --name prod-nextjs -p 3000:3000 hainguyenstudy/nextjs:latest
          docker image prune -f
          echo "Deployment completed successfully!"
