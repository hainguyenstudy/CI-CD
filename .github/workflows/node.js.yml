name: Node.js CI & Deploy

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22.x]

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - run: npm ci
    - run: npm run build --if-present
    - run: npm test

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-test          # Chỉ chạy nếu build-and-test thành công (trên tất cả matrix)
    if: github.ref == 'refs/heads/main'   # Chỉ deploy khi push vào main (không deploy trên PR)

    steps:
    - name: Deploy to Server via SSH
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USERNAME }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: ${{ secrets.SSH_PORT || '22' }}
        script: |  # Script chạy trên server sau khi kết nối SSH
          cd /home/hai/source/next.js/examples/with-jest   # Thay bằng đường dẫn project trên server
          
          # Pull code mới từ main
          git fetch origin
          git reset --hard origin/main
          
          # Cài dependencies (nếu dùng npm)
          bun ci --production   # Hoặc bun install / yarn install nếu dùng
          
          # Build lại nếu cần
          bun run build
          
          # Restart app (tùy cách bạn chạy app: pm2, systemd, docker, ...)
          # Ví dụ nếu dùng pm2:
          pm2 restart 
          
          
          # Hoặc nếu dùng Docker:
          # docker compose down && docker compose pull && docker compose up -d
          
          echo "Deployment completed successfully!"
