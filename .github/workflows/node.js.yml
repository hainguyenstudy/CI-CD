name: Node.js CI & Deploy

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22.x]

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - run: npm ci
    - run: npm run build --if-present
    - run: npm test

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-test          # Chỉ chạy nếu build-and-test thành công (trên tất cả matrix)
    if: github.ref == 'refs/heads/main'   # Chỉ deploy khi push vào main (không deploy trên PR)

    steps:
    - name: Deploy to Server via SSH
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USERNAME }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: ${{ secrets.SSH_PORT || '22' }}
        script: |
          cd /home/hai/source/next.js/examples/with-jest
          
          git fetch origin
          git reset --hard origin/main
          
          /home/hai/.bun/bin/bun install --production
          /home/hai/.bun/bin/bun run build
          
          /home/hai/.npm-global/bin/pm2 restart next-jest || /home/hai/.npm-global/bin/pm2 start npm --name "next-jest" -- run start
          
          echo "Deployment completed successfully!"
